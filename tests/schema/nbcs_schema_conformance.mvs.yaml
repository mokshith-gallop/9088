# =============================================================================
# nbcs_schema_conformance.mvs.yaml
# NBCS warehouse — 100 tables + 15 views across 3 datasets.
#
# Migration Validation Spec for BigQuery physical schema DDL.
# The harness applies the DDL files to a clean build dataset, then validates
# every table/view against this spec via INFORMATION_SCHEMA.
#
# AC mapping:
#   AC1 → expect_table_count per suite (45 + 30 + 25 = 100 tables)
#   AC2 → every column with type, source_type, scale, description
#   AC3 → expect_object_type TABLE/VIEW on all 115 entries
#   AC4 → partition_by + cluster_by per locked matrix
#   AC5 → FK↔PK type consistency (same type on both sides)
#   AC6 → query_performance suite (100 SELECT * + 3 tier queries)
#   AC7 → 15 VIEW entries in nbcs-dm-schema
#   AC8 → harness HARD FAILs any missing INFORMATION_SCHEMA entry
#   AC9 → harness executes all checks live, reports checked X of Y
#
# Reserved-word check: all column names verified — 0 collisions with
# BigQuery reserved words.
# =============================================================================
name: nbcs_full_schema_conformance
description: >-
  NBCS warehouse — 100 tables + 15 views across 3 datasets
  (nbcs_staging, nbcs_ods, nbcs_dm). Full per-column fidelity check.

connections:
  source: { engine: impala }
  target: { engine: bigquery }

migration:
  steps:
    - { kind: ddl, sql: ddl/00-create-datasets.sql }
    - { kind: ddl, sql: ddl/01-staging-sqoop-mirrors.sql }
    - { kind: ddl, sql: ddl/02-staging-delta-feeds.sql }
    - { kind: ddl, sql: ddl/03-staging-file-feeds.sql }
    - { kind: ddl, sql: ddl/04-ods-cleanse.sql }
    - { kind: ddl, sql: ddl/05-ods-delta-scd2.sql }
    - { kind: ddl, sql: ddl/06-ods-acid.sql }
    - { kind: ddl, sql: ddl/07-dm-tables.sql }
    - { kind: ddl, sql: ddl/08-dm-views.sql }

# Stand up the legacy source tables (schema-only) from the real Hive DDL so the
# source cross-check has a live source to DESCRIBE. Sandbox-guarded by
# DMT_SOURCE_SETUP env var — no-op against a real legacy DB.
source_setup:
  ddl:
    - /workspace/source/hive/ddl/01-create-databases.hql
    - /workspace/source/hive/ddl/02-staging-sqoop-mirrors.hql
    - /workspace/source/hive/ddl/03-staging-delta-feeds.hql
    - /workspace/source/hive/ddl/04-staging-file-feeds.hql
    - /workspace/source/hive/ddl/05-ods-cleanse.hql
    - /workspace/source/hive/ddl/06-ods-delta-scd2.hql
    - /workspace/source/hive/ddl/07-ods-acid.hql
    - /workspace/source/hive/ddl/08-dm-tables.hql

